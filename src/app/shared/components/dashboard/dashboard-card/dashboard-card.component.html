<ion-card>
  <ion-card-header>
    <ion-card-title>
      <ion-icon [name]="icono"></ion-icon>
      {{ titulo }}
    </ion-card-title>
  </ion-card-header>

  <ion-card-content>
    <ion-text [color]="color">
      <h2>${{ monto | number:'1.0-0' }}</h2>
    </ion-text>
  </ion-card-content>
</ion-card>
