
<ion-content [fullscreen]="true" class="ion-padding">
  <div class="login-container">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Bienvenido a MoneyWise</ion-card-title>
        <ion-card-subtitle>Ingresa tus credenciales</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
          <ion-grid>
            <ion-row>
              <ion-col>
                <ion-input
                  label="Email"
                  type="email"
                  placeholder="email@email.com"
                  formControlName="email"
                  required
                ></ion-input>
              </ion-col>
            </ion-row>
            <ion-row>
              <ion-col>
                <ion-input
                  position="floating"
                  label="Contraseña"
                  type="password"
                  placeholder="******"
                  formControlName="password"
                  required
                ></ion-input>
              </ion-col>
            </ion-row>
          </ion-grid>
          
          <ion-button
            expand="block"
            type="submit"
            [disabled]="loginForm.invalid || isLoading"
            class="ion-margin-top">
            <ion-spinner *ngIf="isLoading" slot="start" name="crescent"></ion-spinner>
            {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
          </ion-button>
        </form>

        <ion-button
          fill="clear"
          expand="block"
          routerLink="/register"
          class="ion-margin-top">
          ¿No tienes cuenta? Regístrate
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
